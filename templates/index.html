<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommender System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<style>
    .text-white {
        color: white
    }
</style>

<body style="background-color: black;">
    <nav class="navbar" style="background-color: brown;">
        <a class="navbar-brand"> <b>BROKIER</b></a>
        <ul style="list-style-type: none;" class="nav navbar-nav">
          <li class="ul-list" ><a href="/">Home</a></li>
            <li class="ul-list" ><a href="recommend.html">Recommend</a></li>
            <li class="ul-list"><a>Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text-white" style="font-size: 50; ">Top 50 Books</h1>
            </div>


            {% for i in range(book_name|length)%}
            <div class="col-md-3" style="margin-top: 40px;">
                <div class="card" style="border: 0ch;">
                    <div class="card-body" style="background-color: black;">
                        <img class="card-image-top" src="{{ image[i] }}" style="justify-content: center; align-items: center;">
                        <h3 class="text-white" >{{ book_name[i] }}</h3>
                        <p class="text-white">{{ author[i] }}</p>
                        <p class="text-white">{{ votes[i] }}</p>
                        <p class="text-white">{{ rating[i] }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}

            

        </div>
    </div>
</body>

</html>
